[tool.poetry]
name = "bt-backtest"
version = "0.1.0"
description = "backtest"
authors = ["hengxin.liu <13776668123@163.com>"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.9"
pyarrow = "^19.0.1"
ipython = "7.31.1"
colorama = "^0.4.6"
bt-sdk = "0.3.2"

[[tool.poetry.source]]
name = "tuna"
url = "https://pypi.tuna.tsinghua.edu.cn/simple/"
# optional: make this your default source for all installs
default = true

[[tool.poetry.source]]
name = "devpi"
url = "http://localhost:3141/bt_sdk/dev/+simple/"
# optional: make this your default source for all installs
secondary = true

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
