[build-system]
requires = ["poetry-core", "wheel", "pybind11", "cmake", "Cython>=3.0", "numpy", "setuptools"]
# build-backend =  "setuptools.build_meta" 
build-backend = "poetry.core.masonry.api" # scikit-build-core for cmake
